services:
    sql-server:
        image: mcr.microsoft.com/mssql/server:2022-latest
        container_name: sql-server
        hostname: sql-server
        environment:
            - ACCEPT_EULA=Y
            - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
            - MSSQL_PID=${MSSQL_PID}
        ports:
            - "1433:1433"
        volumes:
            - sql-server-data:/var/opt/mssql
        networks:
            - detki-prod-network
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${MSSQL_SA_PASSWORD}' -Q 'SELECT 1' -C -N || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    redis:
        image: redis:latest
        container_name: redis
        hostname: redis
        ports:
            - "6379:6379"
        volumes:
            - redis-data:/data
        networks:
            - detki-prod-network
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 20s

    telegram-bot-api:
        image: aiogram/telegram-bot-api
        container_name: telegram-bot-api
        ports:
            - "8081:8081"
        environment:
            - TELEGRAM_API_ID=${TELEGRAM_API_ID}
            - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
            - TELEGRAM_LOCAL=1
            - TELEGRAM_VERBOSITY=3
        volumes:
            - "telegram-bot-api-data:/etc/telegram-bot-api"
            - "telegram-bot-api-files:/var/lib/telegram-bot-api"
        networks:
            - detki-prod-network
        restart: unless-stopped

    detki-prod-api:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: detki-prod-api
        ports:
            - "5000:80"
        environment:
            - ASPNETCORE_URLS=http://+:80
            - ConnectionStrings__MsSqlConnection=${MS_SQL_CONNECTION}
            - ConnectionStrings__RedisConnection=${REDIS_CONNECTION}
            - JwtOptions__SecretKey=${JWT_SECRET_KEY}
            - JwtOptions__Issuer=${JWT_ISSUER}
            - JwtOptions__Audience=${JWT_AUDIENCE}
            - JwtOptions__ExpirationMinutes=${JWT_EXPIRATION_MINUTES}
            - ApiUrls__FilesDownloadUrl=${FILES_DOWNLOAD_URL}
            - AdminOptions__Password=${ADMIN_PASSWORD}
            - Telegram__BotToken=${TELEGRAM_BOT_TOKEN}
            - Telegram__BotApiLocalServerUrl=${TELEGRAM_BOT_API_LOCAL_SERVER_URL}
        depends_on:
            sql-server:
                condition: service_healthy
            redis:
                condition: service_healthy
        volumes:
            - detki-prod-videos:/app/Videos
            - dataprotection-keys:/root/.aspnet/DataProtection-Keys
            - "telegram-bot-api-files:/var/lib/telegram-bot-api"
        networks:
            - detki-prod-network
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "dotnet --info || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    detki-prod-front:
        build:
            context: DetkiProd.Frontend/
            dockerfile: Dockerfile
        container_name: detki-prod-front
        ports:
            - "3000:3000"
        environment: 
            - NUXT_PUBLIC_MAIN_VIDEO_URL=${API_MAIN_VIDEO_URL}
            - NUXT_PUBLIC_PROJECTS_URL=${API_PROJECTS_URL}
        depends_on:
            detki-prod-api:
                condition: service_healthy
        networks:
            - detki-prod-network
        restart: unless-stopped

volumes:
    sql-server-data:
    redis-data:
    detki-prod-videos:
    dataprotection-keys:
    telegram-bot-api-data:
    telegram-bot-api-files:

networks:
    detki-prod-network:
