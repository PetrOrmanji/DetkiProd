services:
    telegram-bot-api:
        image: aiogram/telegram-bot-api
        container_name: telegram-bot-api
        ports:
            - "127.0.0.1:8081:8081"
        environment:
            - TELEGRAM_API_ID=${TELEGRAM_API_ID}
            - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
            - TELEGRAM_LOCAL=1
            - TELEGRAM_VERBOSITY=3
        volumes:
            - "telegram-bot-api-data:/etc/telegram-bot-api"
            - "telegram-bot-api-files:/var/lib/telegram-bot-api"
        networks:
            - detki-prod-network
        restart: unless-stopped

    detki-prod-api:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: detki-prod-api
        ports:
            - "8080:80"
        environment:
            - ASPNETCORE_URLS=http://+:80
            - ConnectionStrings__PostgresConnection=${POSTGRES_CONNECTION}
            - ConnectionStrings__RedisConnection=${REDIS_CONNECTION}
            - JwtOptions__SecretKey=${JWT_SECRET_KEY}
            - JwtOptions__Issuer=${JWT_ISSUER}
            - JwtOptions__Audience=${JWT_AUDIENCE}
            - JwtOptions__ExpirationMinutes=${JWT_EXPIRATION_MINUTES}
            - ApiUrls__FilesDownloadUrl=${FILES_DOWNLOAD_URL}
            - AdminOptions__Password=${ADMIN_PASSWORD}
            - Telegram__BotToken=${TELEGRAM_BOT_TOKEN}
            - Telegram__BotApiLocalServerUrl=${TELEGRAM_BOT_API_LOCAL_SERVER_URL}
            - Telegram__ProxyUrl=${TELEGRAM_PROXY_URL}
            - Telegram__ProxyLogin=${TELEGRAM_PROXY_LOGIN}
            - Telegram__ProxyPassword=${TELEGRAM_PROXY_PASSWORD}
        volumes:
            - detki-prod-videos:/app/Videos
            - dataprotection-keys:/root/.aspnet/DataProtection-Keys
            - "telegram-bot-api-files:/var/lib/telegram-bot-api"
        networks:
            - detki-prod-network
            - infra-network
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "dotnet --info || exit 1"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    detki-prod-front:
        build:
            context: DetkiProd.Frontend/
            dockerfile: Dockerfile
        container_name: detki-prod-front
        ports:
            - "3000:3000"
        environment: 
            - NUXT_PUBLIC_MAIN_VIDEO_URL=${API_MAIN_VIDEO_URL}
            - NUXT_PUBLIC_PROJECTS_URL=${API_PROJECTS_URL}
        depends_on:
            detki-prod-api:
                condition: service_healthy
        networks:
            - detki-prod-network
        restart: unless-stopped

volumes:
    detki-prod-videos:
    dataprotection-keys:
    telegram-bot-api-data:
    telegram-bot-api-files:

networks:
    detki-prod-network:
    infra-network:
        external: true
        name: infra-network